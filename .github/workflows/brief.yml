name: Distro Daily Brief
on:
  schedule:
    - cron: '0 16 * 4-10 *'
    - cron: '0 17 * 1-3,11-12 *'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Send Brief
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 ai_brief.py
